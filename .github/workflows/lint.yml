name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust-fmt:
    name: cargo fmt
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.91.1
        with:
          components: rustfmt
      - name: Check formatting (core only — upstream is not modified)
        working-directory: packages/core
        run: cargo fmt --check

  ts-lint:
    name: tsc --noEmit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile=false
      - working-directory: packages/api
        run: pnpm run lint
